<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagaska AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .message-bubble { max-width: 85%; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .model-card { transition: all 0.3s; cursor: pointer; }
        .model-card:hover { transform: translateX(5px); }
        .model-card.active { border-left: 4px solid #667eea; background: rgba(102, 126, 234, 0.1); }
        .typing-indicator span { animation: blink 1.4s infinite both; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen overflow-hidden">
    <div class="flex h-full">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-80 bg-gray-800 border-r border-gray-700 flex flex-col fixed md:relative h-full z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
            <div class="p-6 border-b border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">Pagaska AI</h1>
                        <p class="text-xs text-gray-400">Multi-Engine Chat</p>
                    </div>
                </div>
            </div>

            <div class="p-4 space-y-2 overflow-y-auto flex-1">
                <h3 class="text-xs font-semibold text-gray-500 uppercase mb-3">Pilih Model</h3>
                
                <div class="model-card active p-4 rounded-lg bg-gray-700/50 border border-gray-600" onclick="selectModel('unlimited', this)" data-model="unlimited">
                    <div class="flex items-center justify-between mb-1">
                        <span class="font-semibold text-sm flex items-center gap-2">
                            <span class="w-2 h-2 bg-green-400 rounded-full"></span>
                            Unlimited AI
                        </span>
                        <span class="text-xs bg-green-500/20 text-green-400 px-2 py-0.5 rounded">Online</span>
                    </div>
                    <p class="text-xs text-gray-400">Model reasoning cepat</p>
                </div>

                <div class="model-card p-4 rounded-lg bg-gray-700/50 border border-gray-600" onclick="selectModel('pixel', this)" data-model="pixel">
                    <div class="flex items-center justify-between mb-1">
                        <span class="font-semibold text-sm flex items-center gap-2">
                            <span class="w-2 h-2 bg-blue-400 rounded-full"></span>
                            Pixel Chat
                        </span>
                        <span class="text-xs bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded">Character</span>
                    </div>
                    <p class="text-xs text-gray-400">AI dengan personality</p>
                </div>

                <div class="model-card p-4 rounded-lg bg-gray-700/50 border border-gray-600" onclick="selectModel('deepseek', this)" data-model="deepseek">
                    <div class="flex items-center justify-between mb-1">
                        <span class="font-semibold text-sm flex items-center gap-2">
                            <span class="w-2 h-2 bg-purple-400 rounded-full"></span>
                            DeepSeek
                        </span>
                        <span class="text-xs bg-purple-500/20 text-purple-400 px-2 py-0.5 rounded">Deep Think</span>
                    </div>
                    <p class="text-xs text-gray-400">Reasoning & coding</p>
                </div>

                <!-- DeepSeek Mode Toggle -->
                <div id="deepseekOptions" class="hidden mt-3 p-3 bg-gray-800 rounded-lg border border-gray-600">
                    <label class="text-xs text-gray-400 block mb-2">Mode DeepSeek:</label>
                    <select id="deepseekMode" class="w-full bg-gray-700 text-white text-sm rounded px-3 py-2 border border-gray-600 focus:border-blue-500 outline-none">
                        <option value="flash">Flash (Cepat)</option>
                        <option value="think">Think (Deep Reasoning)</option>
                    </select>
                </div>
            </div>

            <div class="p-4 border-t border-gray-700">
                <button onclick="newChat()" class="w-full py-3 bg-gray-700 hover:bg-gray-600 rounded-lg flex items-center justify-center gap-2 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    <span class="font-medium">Chat Baru</span>
                </button>
            </div>
        </aside>

        <!-- Overlay for mobile -->
        <div id="overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="toggleSidebar()"></div>

        <!-- Main Chat -->
        <main class="flex-1 flex flex-col bg-gray-900 min-w-0">
            <header class="h-16 border-b border-gray-700 flex items-center justify-between px-4 bg-gray-800">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-gray-700 rounded-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                    <div>
                        <h2 class="font-semibold" id="currentModelName">Unlimited AI</h2>
                        <p class="text-xs text-gray-400" id="modelStatus">Siap membantu</p>
                    </div>
                </div>
                <button onclick="clearChat()" class="p-2 hover:bg-gray-700 rounded-lg text-gray-400 hover:text-red-400 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </button>
            </header>

            <div id="chatContainer" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="text-center py-12">
                    <div class="w-16 h-16 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold mb-2">Selamat Datang</h2>
                    <p class="text-gray-400 text-sm">Pilih model AI dan mulai chat</p>
                </div>
            </div>

            <div class="border-t border-gray-700 p-4 bg-gray-800">
                <div class="max-w-4xl mx-auto flex gap-2">
                    <textarea id="messageInput" rows="1" class="flex-1 bg-gray-700 text-white rounded-lg px-4 py-3 resize-none outline-none focus:ring-2 focus:ring-blue-500 max-h-32" placeholder="Ketik pesan..." onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                    <button onclick="sendMessage()" id="sendBtn" class="gradient-bg px-6 rounded-lg hover:opacity-90 transition-opacity disabled:opacity-50">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentModel = 'unlimited';
        let isGenerating = false;
        let conversationId = null;

        const modelInfo = {
            unlimited: { name: 'Unlimited AI', status: 'Siap membantu' },
            pixel: { name: 'Pixel Chat', status: 'Character AI aktif' },
            deepseek: { name: 'DeepSeek', status: 'Deep reasoning ready' }
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const isHidden = sidebar.classList.contains('-translate-x-full');
            
            if (isHidden) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function selectModel(model, element) {
            currentModel = model;
            
            // Update UI
            document.querySelectorAll('.model-card').forEach(card => {
                card.classList.remove('active');
            });
            element.classList.add('active');
            
            // Update header
            document.getElementById('currentModelName').textContent = modelInfo[model].name;
            document.getElementById('modelStatus').textContent = modelInfo[model].status;
            
            // Show/hide deepseek options
            const deepseekOpts = document.getElementById('deepseekOptions');
            if (model === 'deepseek') {
                deepseekOpts.classList.remove('hidden');
            } else {
                deepseekOpts.classList.add('hidden');
            }
            
            // Close mobile sidebar
            if (window.innerWidth < 768) toggleSidebar();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 128) + 'px';
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function addMessage(text, isUser = false, isThinking = false) {
            const container = document.getElementById('chatContainer');
            
            // Remove welcome
            if (container.querySelector('.text-center')) {
                container.innerHTML = '';
            }
            
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} message-bubble`;
            
            if (isThinking) {
                div.innerHTML = `
                    <div class="bg-blue-900/50 border-l-4 border-blue-400 rounded-lg p-4 max-w-3xl">
                        <div class="text-xs text-blue-300 mb-1 font-semibold">🧠 Thinking Process</div>
                        <div class="text-sm text-gray-300 whitespace-pre-wrap font-mono">${escapeHtml(text)}</div>
                    </div>
                `;
            } else {
                const formatted = isUser ? escapeHtml(text) : formatText(text);
                div.innerHTML = `
                    <div class="${isUser ? 'gradient-bg text-white' : 'bg-gray-800 border border-gray-600'} rounded-2xl px-5 py-3 max-w-3xl shadow-lg">
                        <div class="text-sm leading-relaxed">${formatted}</div>
                    </div>
                `;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatText(text) {
            // Simple markdown
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/```([\s\S]*?)```/g, '<pre class="bg-gray-900 p-3 rounded mt-2 overflow-x-auto"><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code class="bg-gray-700 px-1 rounded text-xs">$1</code>')
                .replace(/\n/g, '<br>');
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = 'flex justify-start message-bubble';
            div.innerHTML = `
                <div class="bg-gray-800 border border-gray-600 rounded-2xl px-5 py-4">
                    <div class="typing-indicator flex gap-1">
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                    </div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || isGenerating) return;

            addMessage(text, true);
            input.value = '';
            input.style.height = 'auto';
            
            showTyping();
            isGenerating = true;
            document.getElementById('sendBtn').disabled = true;

            try {
                const body = { message: text };
                
                if (currentModel === 'pixel') {
                    body.characterId = "6472508d-5763-415d-8d8e-db48c7fbd05a";
                    body.conversationId = conversationId;
                } else if (currentModel === 'deepseek') {
                    body.mode = document.getElementById('deepseekMode').value;
                }

                const res = await fetch(`/api/${currentModel}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();
                removeTyping();

                if (!data.success) {
                    throw new Error(data.error || 'Unknown error');
                }

                // Handle response
                if (currentModel === 'pixel') {
                    conversationId = data.conversation_id;
                    addMessage(data.message, false);
                } else if (currentModel === 'deepseek' && data.think) {
                    addMessage(data.think, false, true);
                    addMessage(data.response, false);
                } else {
                    addMessage(data.response, false);
                }

            } catch (err) {
                removeTyping();
                addMessage('❌ Error: ' + err.message, false);
                console.error(err);
            } finally {
                isGenerating = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        function newChat() {
            document.getElementById('chatContainer').innerHTML = `
                <div class="text-center py-12">
                    <div class="w-16 h-16 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold mb-2">Chat Baru</h2>
                    <p class="text-gray-400 text-sm">Mulai percakapan baru</p>
                </div>
            `;
            conversationId = null;
        }

        function clearChat() {
            if (confirm('Hapus semua chat?')) newChat();
        }
    </script>
</body>
</html>
