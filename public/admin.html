<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Pagaska AI</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg1:#0f0f0f;--bg2:#141414;--bg3:#1c1c1c;
  --border:#1e1e1e;--border2:#2a2a2a;--border3:#333;
  --text:#f0ece4;--text2:#888;--text3:#555;
  --red:#9b1111;--red2:#c0392b;--gold:#c9a84c;--gold2:#e8c96a;
  --green:#16a34a;--blue:#1d4ed8;--orange:#c2410c;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5}

/* ── Layout ── */
.layout{display:flex;min-height:100dvh}
.sidebar{
  width:220px;flex-shrink:0;background:var(--bg1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100dvh;
}
.sidebar-top{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(145deg,#1e0505,#3d0a0a);
  border:1px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
}
.logo h1{font-size:14px;font-weight:700;color:var(--gold2)}
.logo p{font-size:10px;color:var(--text3)}
.admin-badge{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;
  background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.2);
  margin-top:8px;
}
.nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 10px;
  border-radius:9px;color:var(--text2);cursor:pointer;
  border:1px solid transparent;transition:all 0.15s;background:transparent;
  font-size:13px;font-family:inherit;width:100%;text-align:left;
}
.nav-item:hover{background:var(--bg2);color:var(--text);border-color:var(--border)}
.nav-item.active{background:var(--bg2);color:var(--text);border-color:var(--border2)}
.nav-item svg{flex-shrink:0;opacity:0.7}
.nav-item.active svg{opacity:1}
.sidebar-bottom{padding:12px 8px}
.btn-back{
  width:100%;padding:9px 10px;border-radius:9px;
  background:transparent;border:1px solid var(--border2);
  color:var(--text2);font-size:13px;font-family:inherit;
  cursor:pointer;text-align:left;display:flex;align-items:center;gap:9px;
  transition:all 0.15s;
}
.btn-back:hover{color:var(--text);border-color:var(--border3)}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{
  height:52px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;background:var(--bg);position:sticky;top:0;z-index:10;
}
.topbar h2{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:8px}
.badge-admin{
  font-size:11px;padding:3px 10px;border-radius:20px;
  background:rgba(192,57,43,0.15);color:#e87070;
  border:1px solid rgba(192,57,43,0.25);
}
.btn-refresh{
  padding:6px 12px;border-radius:8px;font-size:12px;
  background:var(--bg2);border:1px solid var(--border2);
  color:var(--text2);cursor:pointer;font-family:inherit;
  transition:all 0.15s;display:flex;align-items:center;gap:6px;
}
.btn-refresh:hover{border-color:var(--border3);color:var(--text)}

.content{padding:24px;flex:1}
.page{display:none}
.page.active{display:block}

/* ── Stat cards ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{
  background:var(--bg1);border:1px solid var(--border);border-radius:12px;
  padding:16px;
}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* ── Section titles ── */
.section-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:12px}

/* ── Tables ── */
.table-wrap{background:var(--bg1);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
table{width:100%;border-collapse:collapse}
thead th{
  padding:10px 14px;text-align:left;font-size:11px;font-weight:600;
  color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;
  border-bottom:1px solid var(--border);background:var(--bg2);
}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg2)}
td{padding:10px 14px;font-size:13px;color:var(--text2);vertical-align:top}
td.primary{color:var(--text);font-weight:500}
.tag{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;
  border:1px solid;white-space:nowrap;
}
.tag-green{background:rgba(22,163,74,0.1);color:#4ade80;border-color:rgba(22,163,74,0.2)}
.tag-blue{background:rgba(29,78,216,0.1);color:#60a5fa;border-color:rgba(29,78,216,0.2)}
.tag-orange{background:rgba(194,65,12,0.1);color:#fb923c;border-color:rgba(194,65,12,0.2)}
.tag-red{background:rgba(192,57,43,0.1);color:#e87070;border-color:rgba(192,57,43,0.25)}
.tag-gray{background:rgba(88,88,88,0.15);color:var(--text2);border-color:var(--border2)}

/* ── Chat detail modal ── */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);
  z-index:100;align-items:center;justify-content:center;padding:20px;
}
.modal-bg.show{display:flex}
.modal{
  background:var(--bg1);border:1px solid var(--border2);border-radius:14px;
  width:100%;max-width:620px;max-height:80vh;display:flex;flex-direction:column;
  overflow:hidden;
}
.modal-header{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.modal-header h3{font-size:14px;font-weight:600}
.modal-close{
  width:28px;height:28px;border-radius:7px;background:var(--bg2);
  border:1px solid var(--border);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.modal-body{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.chat-bubble{padding:9px 12px;border-radius:10px;font-size:13px;line-height:1.5;max-width:90%}
.chat-bubble.user{
  background:linear-gradient(135deg,#9b1111,#7a0d0d);color:#fff;
  margin-left:auto;border-bottom-right-radius:3px;
}
.chat-bubble.ai{
  background:var(--bg3);border:1px solid var(--border);color:var(--text);
  border-bottom-left-radius:3px;
}
.chat-role{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px}

/* ── Delete btn ── */
.btn-del{
  padding:4px 10px;border-radius:7px;font-size:11px;
  background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.25);
  color:#e87070;cursor:pointer;font-family:inherit;transition:all 0.15s;
}
.btn-del:hover{background:rgba(192,57,43,0.2)}

/* ── Loading / empty ── */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-input{
  padding:8px 12px;border-radius:9px;background:var(--bg2);
  border:1px solid var(--border2);color:var(--text);font-size:13px;font-family:inherit;
  outline:none;transition:border-color 0.15s;
}
.filter-input:focus{border-color:rgba(201,168,76,0.35)}
.filter-input::placeholder{color:var(--text3)}
select.filter-input{cursor:pointer}
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 16 16" width="14" height="14">
            <polygon points="8,1 9.8,5.8 15,5.8 10.8,9 12.5,14 8,11 3.5,14 5.2,9 1,5.8 6.2,5.8" fill="#C9A84C"/>
          </svg>
        </div>
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--gold2)">Pagaska AI</div>
          <div style="font-size:10px;color:var(--text3)">Admin Panel</div>
        </div>
      </div>
      <div class="admin-badge">⚡ Admin Access</div>
    </div>

    <nav class="nav">
      <button class="nav-item active" onclick="showPage('overview')" id="nav-overview">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </button>
      <button class="nav-item" onclick="showPage('chats')" id="nav-chats">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Semua Chat
      </button>
      <button class="nav-item" onclick="showPage('users')" id="nav-users">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Pengguna
      </button>
    </nav>

    <div class="sidebar-bottom">
      <button class="btn-back" onclick="window.location.href='/'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Kembali ke Chat
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <h2 id="pageTitle">Overview</h2>
      <div class="topbar-right">
        <span class="badge-admin" id="adminName">Admin</span>
        <button class="btn-refresh" onclick="loadData()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          Refresh
        </button>
      </div>
    </div>

    <div class="content">

      <!-- OVERVIEW -->
      <div class="page active" id="page-overview">
        <div class="stats-grid" id="statsGrid">
          <div class="loading">Memuat data...</div>
        </div>
        <div class="section-title">Chat Terbaru</div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Pengguna</th><th>Gen</th><th>Model</th><th>Pesan</th><th>Waktu</th><th></th>
            </tr></thead>
            <tbody id="recentChats"><tr><td colspan="6" class="loading">Memuat...</td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- CHATS -->
      <div class="page" id="page-chats">
        <div class="filter-bar">
          <input class="filter-input" id="filterUser" placeholder="Cari nama pengguna..." oninput="renderChats()" style="flex:1;min-width:160px">
          <select class="filter-input" id="filterModel" onchange="renderChats()">
            <option value="">Semua model</option>
            <option value="pagaska">Pagaska AI</option>
            <option value="unlimited">Unlimited</option>
            <option value="gita">GitaGPT</option>
            <option value="gpt4">GPT-4</option>
          </select>
          <select class="filter-input" id="filterGen" onchange="renderChats()">
            <option value="">Semua generasi</option>
            <option value="1">Gen 1</option>
            <option value="2">Gen 2</option>
            <option value="3">Gen 3</option>
            <option value="4">Gen 4</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Pengguna</th><th>Gen</th><th>Model</th><th>Preview</th><th>Pesan</th><th>Waktu</th><th></th>
            </tr></thead>
            <tbody id="allChatsBody"><tr><td colspan="7" class="loading">Memuat...</td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- USERS -->
      <div class="page" id="page-users">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Nama</th><th>Jabatan</th><th>Gen</th><th>Tipe</th><th>Total Chat</th>
            </tr></thead>
            <tbody id="usersBody"><tr><td colspan="5" class="loading">Memuat...</td></tr></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal detail chat -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Detail Chat</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
let allChats = [];
let allUsers = [];
let stats = {};
const TOKEN = localStorage.getItem('pagaska_token');

if (!TOKEN) window.location.href = '/login.html';

// ── Nav ──────────────────────────────────────────────────────
const pageTitles = { overview:'Overview', chats:'Semua Chat', users:'Pengguna' };

function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`page-${p}`).classList.add('active');
  document.getElementById(`nav-${p}`).classList.add('active');
  document.getElementById('pageTitle').textContent = pageTitles[p];
}

// ── Load ─────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('/api/admin', {
      headers: { Authorization: `Bearer ${TOKEN}` }
    });
    if (res.status === 403) {
      alert('Akses ditolak. Kamu bukan admin.');
      window.location.href = '/';
      return;
    }
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    allChats = data.chats || [];
    allUsers = data.users || [];
    stats = data.stats || {};

    document.getElementById('adminName').textContent = '⚡ Admin';

    renderStats();
    renderRecentChats();
    renderChats();
    renderUsers();
  } catch (err) {
    console.error(err);
    document.getElementById('statsGrid').innerHTML = `<div class="empty">Gagal memuat: ${err.message}</div>`;
  }
}

// ── Stats ─────────────────────────────────────────────────────
function renderStats() {
  const topUser = Object.values(stats.userStats || {}).sort((a,b) => b.count-a.count)[0];
  const modelEntries = Object.entries(stats.modelStats || {}).sort((a,b)=>b[1]-a[1]);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Chat</div>
      <div class="stat-value">${stats.totalChats || 0}</div>
      <div class="stat-sub">Semua sesi tersimpan</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Pengguna</div>
      <div class="stat-value">${stats.totalUsers || 0}</div>
      <div class="stat-sub">Login terdaftar</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Model Terpopuler</div>
      <div class="stat-value" style="font-size:18px">${modelEntries[0]?.[0] || '—'}</div>
      <div class="stat-sub">${modelEntries[0]?.[1] || 0} chat</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pengguna Aktif</div>
      <div class="stat-value" style="font-size:18px">${topUser?.name?.split(' ')[0] || '—'}</div>
      <div class="stat-sub">${topUser?.count || 0} chat tersimpan</div>
    </div>
  `;
}

// ── Recent chats (overview) ──────────────────────────────────
function renderRecentChats() {
  const tbody = document.getElementById('recentChats');
  const recent = allChats.slice(0, 10);
  if (!recent.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">Belum ada chat</td></tr>'; return; }
  tbody.innerHTML = recent.map(c => chatRow(c, 6)).join('');
}

// ── All chats ────────────────────────────────────────────────
function renderChats() {
  const q = document.getElementById('filterUser').value.toLowerCase();
  const m = document.getElementById('filterModel').value;
  const g = document.getElementById('filterGen').value;

  let filtered = allChats;
  if (q) filtered = filtered.filter(c => c.userName?.toLowerCase().includes(q));
  if (m) filtered = filtered.filter(c => c.model === m);
  if (g) filtered = filtered.filter(c => String(c.userGen) === g);

  const tbody = document.getElementById('allChatsBody');
  if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">Tidak ada data</td></tr>'; return; }
  tbody.innerHTML = filtered.map(c => chatRow(c, 7)).join('');
}

function chatRow(c, cols) {
  const modelTag = {pagaska:'tag-red',unlimited:'tag-green',gita:'tag-orange',gpt4:'tag-blue'}[c.model] || 'tag-gray';
  const genTag = ['','tag-orange','tag-gray','tag-blue','tag-green'][c.userGen] || 'tag-gray';
  const time = c.savedAt ? new Date(c.savedAt).toLocaleString('id-ID',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
  const preview = (c.preview || '—').slice(0,50) + ((c.preview?.length > 50) ? '...' : '');
  return `<tr>
    <td class="primary">${escHtml(c.userName||'—')}</td>
    <td><span class="tag ${genTag}">Gen ${c.userGen||'?'}</span></td>
    <td><span class="tag ${modelTag}">${c.model||'—'}</span></td>
    ${cols===7?`<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(preview)}</td>`:''}
    <td>${c.msgCount||c.messages?.length||'?'}</td>
    <td>${time}</td>
    <td style="white-space:nowrap">
      <button class="btn-del" onclick="viewChat('${c.id}')">Lihat</button>
      <button class="btn-del" style="margin-left:4px" onclick="delChat('${c.id}')">Hapus</button>
    </td>
  </tr>`;
}

// ── Users ────────────────────────────────────────────────────
function renderUsers() {
  const tbody = document.getElementById('usersBody');
  if (!allUsers.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">Belum ada pengguna</td></tr>'; return; }

  tbody.innerHTML = allUsers.map(u => {
    const chatCount = allChats.filter(c => c.userId === u.id).length;
    const genTag = ['','tag-orange','tag-gray','tag-blue','tag-green'][u.generasi] || 'tag-gray';
    const tipeTag = u.isAdmin ? 'tag-red' : u.tipe === 'jabatan' ? 'tag-blue' : 'tag-gray';
    return `<tr>
      <td class="primary">${escHtml(u.nama)}${u.isAdmin?' <span class="tag tag-red">admin</span>':''}</td>
      <td>${escHtml(u.jabatan||'—')}</td>
      <td><span class="tag ${genTag}">Gen ${u.generasi}</span></td>
      <td><span class="tag ${tipeTag}">${u.tipe||'—'}</span></td>
      <td>${chatCount}</td>
    </tr>`;
  }).join('');
}

// ── View chat modal ──────────────────────────────────────────
function viewChat(chatId) {
  const chat = allChats.find(c => c.id === chatId);
  if (!chat) return;
  document.getElementById('modalTitle').textContent = `Chat — ${chat.userName} · ${chat.model}`;
  const body = document.getElementById('modalBody');
  if (!chat.messages?.length) { body.innerHTML = '<div class="empty">Tidak ada pesan</div>'; }
  else {
    body.innerHTML = chat.messages.map(m => `
      <div>
        <div class="chat-role">${m.role === 'user' ? '👤 '+escHtml(chat.userName) : '🤖 AI'}</div>
        <div class="chat-bubble ${m.role === 'user' ? 'user' : 'ai'}">${escHtml(m.content||'')}</div>
      </div>`).join('');
  }
  document.getElementById('modalBg').classList.add('show');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
}

// ── Delete ───────────────────────────────────────────────────
async function delChat(chatId) {
  if (!confirm('Hapus chat ini?')) return;
  try {
    await fetch('/api/chat/delete', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${TOKEN}` },
      body: JSON.stringify({ chatId })
    });
    allChats = allChats.filter(c => c.id !== chatId);
    renderStats(); renderRecentChats(); renderChats(); renderUsers();
  } catch (err) { alert('Gagal hapus: ' + err.message); }
}

function escHtml(t) {
  const d = document.createElement('div'); d.textContent = String(t||''); return d.innerHTML;
}

// ── Init ─────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
