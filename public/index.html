<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pagaska AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; color: white; }
        
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        /* Mobile First Layout */
        .app-container { height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
        
        /* Sidebar - Mobile: bottom sheet, Desktop: left side */
        .sidebar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f0f0f;
            border-top: 1px solid #1f1f1f;
            z-index: 50;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 70vh;
            border-radius: 20px 20px 0 0;
        }
        
        .sidebar.open { transform: translateY(0); }
        
        @media (min-width: 768px) {
            .sidebar {
                position: relative;
                width: 280px;
                height: 100%;
                border-radius: 0;
                border-top: none;
                border-right: 1px solid #1f1f1f;
                transform: none;
                max-height: none;
            }
        }
        
        /* Main chat area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-bottom: 80px; /* Space for mobile nav */
        }
        
        @media (min-width: 768px) {
            .chat-area { padding-bottom: 0; }
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scroll-behavior: smooth;
        }
        
        @media (min-width: 768px) {
            .messages-container { padding: 24px; }
        }
        
        /* Chat bubbles */
        .bubble-user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 18px 18px 4px 18px;
            max-width: 85%;
            margin-left: auto;
        }
        
        .bubble-ai {
            background: #1f1f1f;
            border: 1px solid #2f2f2f;
            border-radius: 18px 18px 18px 4px;
            max-width: 85%;
        }
        
        @media (min-width: 768px) {
            .bubble-user, .bubble-ai { max-width: 70%; }
        }
        
        /* Input area */
        .input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f0f0f;
            border-top: 1px solid #1f1f1f;
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            z-index: 40;
        }
        
        @media (min-width: 768px) {
            .input-container {
                position: relative;
                border-top: 1px solid #1f1f1f;
                padding: 16px 24px;
            }
        }
        
        /* Mobile bottom nav */
        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f0f0f;
            border-top: 1px solid #1f1f1f;
            padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            z-index: 30;
        }
        
        @media (min-width: 768px) {
            .mobile-nav { display: none; }
        }
        
        /* Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 45;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .overlay.show { opacity: 1; visibility: visible; }
        
        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in { animation: fadeInUp 0.4s ease-out; }
        
        /* Model selector pills */
        .model-pill {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .model-pill.active {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            color: #667eea;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Overlay for mobile sidebar -->
        <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>
        
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="p-4 h-full flex flex-col">
                <!-- Handle for mobile -->
                <div class="w-12 h-1 bg-gray-700 rounded-full mx-auto mb-4 md:hidden"></div>
                
                <!-- User Profile -->
                <div class="flex items-center gap-3 mb-4 pb-4 border-b border-gray-800">
                    <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center flex-shrink-0">
                        <span id="userInitial" class="font-bold">P</span>
                    </div>
                    <div class="min-w-0">
                        <h3 id="userName" class="font-semibold text-sm truncate">Loading...</h3>
                        <div class="flex items-center gap-2">
                            <span id="userBadge" class="text-[10px] px-2 py-0.5 rounded-full bg-gray-700">Gen -</span>
                        </div>
                    </div>
                </div>
                
                <!-- Model Selection -->
                <div class="mb-4">
                    <h4 class="text-xs font-semibold text-gray-500 uppercase mb-2">Model AI</h4>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="setModel('unlimited')" id="pill-unlimited" class="model-pill active bg-gray-800 text-gray-300">
                            Unlimited
                        </button>
                        <button onclick="setModel('pixel')" id="pill-pixel" class="model-pill bg-gray-800 text-gray-300">
                            Pixel
                        </button>
                        <button onclick="setModel('deepseek')" id="pill-deepseek" class="model-pill bg-gray-800 text-gray-300">
                            DeepSeek
                        </button>
                        <button onclick="setModel('gemini')" id="pill-gemini" class="model-pill bg-gray-800 text-gray-300">
    Gemini
                        </button>
                    </div>
                    <select id="deepseekMode" class="hidden w-full mt-2 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs">
                        <option value="flash">⚡ Flash</option>
                        <option value="think">🧠 Think</option>
                    </select>
                    <select id="geminiMode" class="hidden w-full mt-2 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs">
    <option value="gemini-pro">⚡ Gemini Pro</option>
    <option value="gemini-1.5">🧠 Gemini 1.5</option>
    <option value="gemini-flash">🚀 Gemini Flash</option>
                    </select>
                </div>
                
                <!-- Chat History -->
                <div class="flex-1 overflow-y-auto">
                    <h4 class="text-xs font-semibold text-gray-500 uppercase mb-2">Riwayat</h4>
                    <div id="chatHistory" class="space-y-1">
                        <div class="text-center py-4 text-gray-500 text-xs">Belum ada riwayat</div>
                    </div>
                </div>
                
                <!-- Actions -->
                <div class="pt-4 border-t border-gray-800 space-y-2">
                    <button onclick="newChat()" class="w-full py-2.5 gradient-bg rounded-xl text-sm font-medium flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Chat Baru
                    </button>
                    <button onclick="logout()" class="w-full py-2.5 border border-gray-700 rounded-xl text-sm text-gray-400 hover:text-white">
                        Keluar
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <!-- Header -->
            <header class="h-14 border-b border-gray-800 flex items-center justify-between px-4 bg-black/50 backdrop-blur-sm sticky top-0 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="p-2 -ml-2 hover:bg-gray-800 rounded-lg md:hidden">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                    <div>
                        <h1 class="font-semibold text-sm md:text-base" id="currentModel">Unlimited AI</h1>
                        <p class="text-[10px] text-gray-400" id="modelStatus">Online</p>
                    </div>
                </div>
                <button onclick="saveChat()" class="p-2 hover:bg-gray-800 rounded-lg" title="Simpan chat">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                    </svg>
                </button>
            </header>

            <!-- Messages -->
            <div id="messages" class="messages-container space-y-4">
                <div class="text-center py-8 animate-fade-in">
                    <div class="w-16 h-16 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                    </div>
                    <h2 class="text-lg font-bold mb-1">Halo, <span id="welcomeName">-</span>!</h2>
                    <p class="text-gray-400 text-xs">Pilih model dan mulai chat</p>
                </div>
            </div>

            <!-- Input -->
            <div class="input-container">
                <div class="max-w-3xl mx-auto flex gap-2">
                    <textarea 
                        id="input" 
                        rows="1"
                        class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm resize-none outline-none focus:border-purple-500 max-h-24"
                        placeholder="Ketik pesan..."
                        onkeydown="handleKey(event)"
                        oninput="resize(this)"
                    ></textarea>
                    <button onclick="send()" id="sendBtn" class="gradient-bg px-4 rounded-xl disabled:opacity-50">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- Mobile Bottom Nav -->
        <nav class="mobile-nav">
            <button onclick="newChat()" class="flex flex-col items-center gap-1 p-2 text-gray-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                <span class="text-[10px]">Baru</span>
            </button>
            <button onclick="toggleSidebar()" class="flex flex-col items-center gap-1 p-2 text-gray-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
                </svg>
                <span class="text-[10px]">Model</span>
            </button>
            <button onclick="logout()" class="flex flex-col items-center gap-1 p-2 text-gray-400 hover:text-red-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                </svg>
                <span class="text-[10px]">Keluar</span>
            </button>
        </nav>
    </div>

    <script>
        // State
        let currentModel = 'unlimited';
        let isGenerating = false;
        let messages = [];
        let currentUser = null;
        let conversationId = null;

        // Init
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('pagaska_token');
            if (!token) return window.location.href = '/login.html';

            try {
                const res = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!data.success) throw new Error('Auth failed');
                
                currentUser = data.user;
                document.getElementById('userName').textContent = data.user.nama;
                document.getElementById('userInitial').textContent = data.user.nama[0].toUpperCase();
                document.getElementById('userBadge').textContent = `Gen ${data.user.generasi}`;
                document.getElementById('welcomeName').textContent = data.user.nama.split(' ')[0];
                
                // Color badge by generation
                const colors = ['', 'bg-yellow-600', 'bg-gray-500', 'bg-orange-700', 'bg-blue-600'];
                document.getElementById('userBadge').className = `text-[10px] px-2 py-0.5 rounded-full text-white ${colors[data.user.generasi] || 'bg-gray-600'}`;
                
            } catch (err) {
                localStorage.removeItem('pagaska_token');
                window.location.href = '/login.html';
            }
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function setModel(model) {
            currentModel = model;
            document.querySelectorAll('.model-pill').forEach(p => p.classList.remove('active'));
            document.getElementById(`pill-${model}`).classList.add('active');
            
            const names = { unlimited: 'Unlimited AI', pixel: 'Pixel Chat', deepseek: 'DeepSeek', gemini: 'Gemini' };
            document.getElementById('currentModel').textContent = names[model];
            
            const dsMode = 
            document.getElementById('deepseekMode').classList.toggle('hidden', model !== 'deepseek');
            document.getElementById('geminiMode').classList.toggle('hidden', model !== 'gemini');
            
            if (window.innerWidth < 768) toggleSidebar();
        }

        function resize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 96) + 'px';
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        }

        function addMessage(text, isUser = false, isThinking = false) {
            const container = document.getElementById('messages');
            
            // Remove welcome
            if (container.querySelector('.text-center')) {
                container.innerHTML = '';
            }
            
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-fade-in`;
            
            if (isThinking) {
                div.innerHTML = `
                    <div class="max-w-[85%] md:max-w-[70%] p-3 rounded-xl bg-blue-900/30 border-l-4 border-blue-500 text-xs text-blue-200 font-mono">
                        <div class="font-semibold mb-1 text-blue-400">🧠 Thinking</div>
                        ${escapeHtml(text)}
                    </div>
                `;
            } else {
                const bubbleClass = isUser ? 'bubble-user text-white' : 'bubble-ai text-gray-100';
                div.innerHTML = `
                    <div class="${bubbleClass} p-3 text-sm shadow-lg">
                        ${isUser ? escapeHtml(text) : formatText(text)}
                    </div>
                `;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            messages.push({ role: isUser ? 'user' : 'assistant', content: text });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatText(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white">$1</strong>')
                .replace(/```([\s\S]*?)```/g, '<pre class="bg-black/50 p-2 rounded mt-2 overflow-x-auto text-xs"><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code class="bg-gray-700 px-1 rounded text-xs text-purple-300">$1</code>')
                .replace(/\n/g, '<br>');
        }

        function showTyping() {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.id = 'typing';
            div.className = 'flex justify-start';
            div.innerHTML = `
                <div class="bubble-ai p-4 flex gap-1">
                    <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text || isGenerating) return;

            addMessage(text, true);
            input.value = '';
            input.style.height = 'auto';
            
            showTyping();
            isGenerating = true;
            document.getElementById('sendBtn').disabled = true;

            try {
                const token = localStorage.getItem('pagaska_token');
                const body = { message: text };
                
                if (currentModel === 'pixel') {
                    body.characterId = "6472508d-5763-415d-8d8e-db48c7fbd05a";
                    body.conversationId = conversationId;
                } else if (currentModel === 'deepseek') {
                    body.mode = document.getElementById('deepseekMode').value;
                }

                const res = await fetch(`/api/${currentModel}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });

                const data = await res.json();
                document.getElementById('typing')?.remove();

                if (!data.success) throw new Error(data.error);

                if (currentModel === 'pixel') {
                    conversationId = data.conversation_id;
                    addMessage(data.message, false);
                } else if (currentModel === 'deepseek' && data.think) {
                    addMessage(data.think, false, true);
                    addMessage(data.response, false);
                } else {
                    addMessage(data.response, false);
                }

            } catch (err) {
                document.getElementById('typing')?.remove();
                addMessage('❌ Error: ' + err.message, false);
            } finally {
                isGenerating = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        function newChat() {
            document.getElementById('messages').innerHTML = `
                <div class="text-center py-8 animate-fade-in">
                    <div class="w-16 h-16 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                    </div>
                    <h2 class="text-lg font-bold mb-1">Chat Baru</h2>
                    <p class="text-gray-400 text-xs">Mulai percakapan baru</p>
                </div>
            `;
            messages = [];
            conversationId = null;
            if (window.innerWidth < 768) toggleSidebar();
        }

        async function saveChat() {
            if (messages.length === 0) return alert('Tidak ada chat untuk disimpan');
            
            try {
                const token = localStorage.getItem('pagaska_token');
                const res = await fetch('/api/chat/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ messages })
                });
                
                const data = await res.json();
                if (data.success) alert('Chat disimpan!');
            } catch (err) {
                alert('Gagal menyimpan: ' + err.message);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
