<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pagaska AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--bg1:#0f0f12;--bg2:#18181b;--bg3:#27272a;
  --border:#27272a;--border2:#3f3f46;--border3:#52525b;
  --text:#fafafa;--text2:#a1a1aa;--text3:#52525b;
  --red:#dc2626;--red2:#991b1b;--red3:#7f1d1d;
  --gold:#d4a04a;--gold2:#f0c060;
  --green:#22c55e;--blue:#3b82f6;--purple:#a855f7;--orange:#f97316;
  --teal:#14b8a6;--pink:#ec4899;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;overflow:hidden;-webkit-tap-highlight-color:transparent}

/* ===== APP LAYOUT ===== */
.app{display:flex;height:100dvh}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:40;backdrop-filter:blur(2px)}
.overlay.show{display:block}

/* ===== SIDEBAR ===== */
.sidebar{
  width:256px;flex-shrink:0;background:var(--bg1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100%;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.sb-top{padding:16px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-brand{display:flex;align-items:center;gap:9px}
.sb-logo{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(145deg,#300,#600);
  border:1px solid rgba(212,160,74,0.4);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.sb-logo img{width:28px;height:28px;object-fit:contain}
.sb-brand-text{min-width:0}
.sb-brand-name{font-size:14px;font-weight:700;color:var(--gold2);line-height:1.2}
.sb-brand-sub{font-size:10px;color:var(--text3);letter-spacing:.3px}

/* User card */
.sb-user{
  margin:10px 14px 0;padding:9px 11px;border-radius:var(--radius-sm);
  background:var(--bg2);border:1px solid var(--border);
  display:flex;align-items:center;gap:9px;
}
.sb-avatar{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--red2),var(--red));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#fff;
}
.sb-uname{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-ubadge{
  display:inline-block;font-size:9px;padding:1px 6px;border-radius:20px;
  background:var(--bg3);color:var(--text2);border:1px solid var(--border2);
  margin-top:1px;
}

/* Model list */
.sb-section{padding:10px 14px 0}
.sb-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.sb-models{display:flex;flex-direction:column;gap:2px}
.model-btn{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);
  background:transparent;border:1px solid transparent;color:var(--text2);
  cursor:pointer;width:100%;text-align:left;transition:all .14s;font-family:'Inter',sans-serif;
}
.model-btn:hover{background:var(--bg2);border-color:var(--border);color:var(--text)}
.model-btn.active{background:var(--bg2);border-color:var(--border2);color:var(--text)}
.model-btn.active-pagaska{background:rgba(127,29,29,0.25);border-color:rgba(212,160,74,0.3);color:var(--text)}
.model-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.model-icon{width:20px;height:20px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.model-icon img{width:18px;height:18px;object-fit:contain}
.model-name{font-size:12px;font-weight:500;line-height:1.2}
.model-sub{font-size:10px;color:var(--text3);margin-top:1px}
.model-btn.active .model-sub,.model-btn.active-pagaska .model-sub{color:var(--text2)}

/* Chat history */
.sb-history{flex:1;overflow-y:auto;padding:0 14px 8px;margin-top:8px}
.sb-history::-webkit-scrollbar{width:3px}
.sb-history::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.hist-empty{font-size:11px;color:var(--text3);text-align:center;padding:12px 0}
.hist-item{
  padding:7px 9px;border-radius:7px;font-size:11px;color:var(--text2);
  cursor:pointer;border:1px solid transparent;transition:all .12s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;
}
.hist-item:hover{background:var(--bg2);color:var(--text);border-color:var(--border)}
.hist-date{font-size:9px;color:var(--text3);margin-bottom:2px}

/* Sidebar bottom */
.sb-bottom{padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:5px}
.btn-new{
  width:100%;padding:9px 12px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--red2),var(--red));
  border:1px solid rgba(212,160,74,0.15);
  color:#fff;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:opacity .15s;
}
.btn-new:hover{opacity:.88}
.btn-logout{
  width:100%;padding:8px;border-radius:var(--radius-sm);
  background:transparent;border:1px solid var(--border2);
  color:var(--text3);font-size:12px;font-family:'Inter',sans-serif;
  cursor:pointer;transition:all .14s;
}
.btn-logout:hover{border-color:var(--border3);color:var(--text2)}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}

/* Header */
.header{
  height:50px;flex-shrink:0;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;background:var(--bg);position:sticky;top:0;z-index:10;
}
.header-left{display:flex;align-items:center;gap:9px}
.hamburger{
  width:32px;height:32px;border-radius:8px;background:transparent;
  border:1px solid var(--border);color:var(--text2);cursor:pointer;
  display:none;align-items:center;justify-content:center;transition:all .14s;
}
.hamburger:hover{border-color:var(--border2);color:var(--text)}
.header-model{font-size:13px;font-weight:600}
.header-engine{font-size:11px;color:var(--text2);margin-top:1px}
.header-right{display:flex;gap:6px}
.hdr-btn{
  height:32px;padding:0 10px;border-radius:8px;background:transparent;
  border:1px solid var(--border);color:var(--text2);cursor:pointer;
  font-size:11px;font-family:'Inter',sans-serif;
  display:flex;align-items:center;gap:5px;transition:all .14s;
}
.hdr-btn:hover{border-color:var(--border2);color:var(--text)}

/* ===== MESSAGES ===== */
.messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Welcome */
.welcome{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1;text-align:center;padding:24px;gap:14px;
  animation:fadeUp .4s ease both;
}
.welcome-logo{
  width:60px;height:60px;border-radius:16px;
  background:linear-gradient(145deg,#1a0000,#400808);
  border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 28px rgba(127,29,29,.4);overflow:hidden;
}
.welcome-logo img{width:52px;height:52px;object-fit:contain}
.welcome h2{font-size:20px;font-weight:700}
.welcome h2 span{color:var(--gold2)}
.welcome p{font-size:13px;color:var(--text2)}
.quick-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-top:4px;max-width:500px}
.quick-btn{
  padding:7px 13px;border-radius:20px;background:transparent;
  border:1px solid var(--border2);color:var(--text2);font-size:12px;
  font-family:'Inter',sans-serif;cursor:pointer;transition:all .14s;
}
.quick-btn:hover{border-color:rgba(212,160,74,.4);color:var(--gold2)}

/* Message rows */
.msg-row{display:flex;gap:9px;align-items:flex-start;animation:fadeUp .22s ease both}
.msg-row.user{flex-direction:row-reverse}

.msg-avatar{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;
  margin-top:2px;
}
.msg-avatar.ai-av{background:linear-gradient(145deg,#1a0000,#400808);border:1px solid rgba(212,160,74,.3);overflow:hidden}
.msg-avatar.ai-av img{width:24px;height:24px;object-fit:contain}
.msg-avatar.user-av{background:linear-gradient(135deg,var(--red2),var(--red));font-weight:700;color:#fff}

/* Bubbles */
.bubble{
  max-width:76%;padding:10px 14px;font-size:14px;line-height:1.7;
  border-radius:14px;word-break:break-word;
}
.bubble.ai{
  background:var(--bg2);border:1px solid var(--border);color:var(--text);
  border-top-left-radius:4px;
}
.bubble.user{
  background:linear-gradient(135deg,var(--red2),#7a0d0d);
  color:#fff;border-top-right-radius:4px;
  border:1px solid rgba(255,255,255,.04);
}

/* ── Markdown inside bubbles ── */
.bubble h1{font-size:17px;font-weight:700;margin:10px 0 6px;border-bottom:1px solid var(--border2);padding-bottom:4px}
.bubble h2{font-size:15px;font-weight:700;margin:9px 0 5px}
.bubble h3{font-size:14px;font-weight:600;margin:8px 0 4px;color:var(--gold2)}
.bubble h4{font-size:13px;font-weight:600;margin:6px 0 3px;color:var(--text)}
.bubble p{margin:0 0 6px}
.bubble p:last-child{margin-bottom:0}
.bubble strong{font-weight:600;color:var(--text)}
.bubble.user strong{color:#fff}
.bubble em{font-style:italic;opacity:.9}
.bubble ul,.bubble ol{padding-left:18px;margin:4px 0 6px}
.bubble li{margin:2px 0}
.bubble ul li{list-style:disc}
.bubble ol li{list-style:decimal}
.bubble blockquote{
  border-left:3px solid var(--gold);padding:6px 12px;margin:8px 0;
  background:rgba(212,160,74,.06);border-radius:0 6px 6px 0;
  color:var(--text2);font-style:italic;
}
.bubble a{color:var(--blue);text-decoration:underline;word-break:break-all}
.bubble hr{border:none;border-top:1px solid var(--border2);margin:10px 0}
.bubble table{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}
.bubble th{background:var(--bg3);padding:6px 10px;text-align:left;font-weight:600;border:1px solid var(--border2)}
.bubble td{padding:5px 10px;border:1px solid var(--border2)}
.bubble tr:hover td{background:var(--bg3)}

/* Inline code */
.bubble code{
  background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;
  font-size:12.5px;font-family:'JetBrains Mono',monospace;color:#f0a0a0;
}
.bubble.user code{background:rgba(255,255,255,.18);color:#fff}

/* Code blocks */
.code-block{
  margin:8px 0;border-radius:9px;border:1px solid var(--border2);
  overflow:hidden;background:#0d1117;
}
.code-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 12px;background:var(--bg3);border-bottom:1px solid var(--border2);
}
.code-lang{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text2);text-transform:lowercase;letter-spacing:.5px}
.code-copy{
  background:transparent;border:1px solid var(--border2);color:var(--text2);
  font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;
  border-radius:4px;cursor:pointer;transition:all .14s;
}
.code-copy:hover{border-color:var(--border3);color:var(--text)}
.code-block pre{
  margin:0;padding:12px 14px;overflow-x:auto;
  font-size:12.5px;line-height:1.65;
  font-family:'JetBrains Mono',monospace;color:#e6edf3;
}
.code-block pre::-webkit-scrollbar{height:4px}
.code-block pre::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Thinking block */
.thinking-wrap{
  max-width:76%;animation:fadeUp .22s ease both;
}
.thinking-block{
  padding:9px 13px;background:rgba(59,130,246,.06);
  border:1px solid rgba(59,130,246,.18);border-left:3px solid var(--blue);
  border-radius:10px;font-size:12px;color:#93b4d8;
  font-family:'JetBrains Mono',monospace;line-height:1.6;
}
.thinking-label{font-size:10px;font-weight:700;color:var(--blue);margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase}

/* Typing indicator */
.typing-wrap{display:flex;gap:9px;align-items:flex-start}
.typing-dots{display:flex;gap:4px;padding:6px 4px;align-items:center}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:blink 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ===== INPUT BAR ===== */
.input-area{
  border-top:1px solid var(--border);padding:12px 16px;
  background:var(--bg1);flex-shrink:0;
  padding-bottom:calc(12px + env(safe-area-inset-bottom));
}
.input-wrap{display:flex;gap:8px;align-items:flex-end;max-width:780px;margin:0 auto}
.textarea-wrap{flex:1;position:relative}
textarea{
  width:100%;background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:10px 13px;padding-right:40px;
  color:var(--text);font-size:14px;font-family:'Inter',sans-serif;
  resize:none;min-height:42px;max-height:120px;line-height:1.55;
  outline:none;transition:border-color .15s;
}
textarea::placeholder{color:var(--text3)}
textarea:focus{border-color:rgba(212,160,74,.35)}
.paste-indicator{
  position:absolute;right:8px;bottom:9px;
  font-size:9px;color:var(--text3);letter-spacing:.2px;pointer-events:none;
  opacity:0;transition:opacity .2s;
}
textarea:focus~.paste-indicator{opacity:.7}
.send-btn{
  width:42px;height:42px;border-radius:var(--radius-sm);flex-shrink:0;
  background:linear-gradient(135deg,var(--red2),var(--red));
  border:1px solid rgba(212,160,74,.15);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s,transform .1s;
  box-shadow:0 2px 12px rgba(127,29,29,.4);
}
.send-btn:hover{opacity:.88}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* ===== MOBILE ===== */
@media(max-width:700px){
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;z-index:50;
    width:280px;transform:translateX(-100%);
    box-shadow:4px 0 28px rgba(0,0,0,.7);
  }
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:flex}
  .messages{padding:14px 10px}
  .bubble{max-width:90%;font-size:13.5px}
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <!-- Brand -->
    <div class="sb-top">
      <div class="sb-brand">
        <div class="sb-logo">
          <img src="https://iffrqakrixmgobvkzpzc.supabase.co/storage/v1/object/public/foto/logo.png" alt="logo">
        </div>
        <div class="sb-brand-text">
          <div class="sb-brand-name">Pagaska AI</div>
          <div class="sb-brand-sub">Gala Taksaka · SMKN 5 Madiun</div>
        </div>
      </div>
      <div class="sb-user" style="margin-top:10px">
        <div class="sb-avatar" id="userInitial">P</div>
        <div style="min-width:0">
          <div class="sb-uname" id="userName">Loading...</div>
          <span class="sb-ubadge" id="userBadge">Gen —</span>
        </div>
      </div>
    </div>

    <!-- Model List -->
    <div class="sb-section" style="overflow-y:auto;flex:1">
      <div class="sb-label" style="margin-top:10px">Model AI</div>
      <div class="sb-models" id="modelList">

        <button class="model-btn active-pagaska" id="card-pagaska" onclick="setModel('pagaska')">
          <div class="model-icon" style="background:linear-gradient(145deg,#1a0000,#400808);border:1px solid rgba(212,160,74,.3)">
            <img src="https://iffrqakrixmgobvkzpzc.supabase.co/storage/v1/object/public/foto/logo.png" alt="">
          </div>
          <div>
            <div class="model-name" style="color:var(--gold2)">Pagaska AI</div>
            <div class="model-sub">Asisten Gala Taksaka</div>
          </div>
        </button>

        <button class="model-btn" id="card-gpt4" onclick="setModel('gpt4')">
          <div class="model-dot" style="background:#74aa9c"></div>
          <div><div class="model-name">GPT-4</div><div class="model-sub">OpenAI · chateverywhere</div></div>
        </button>

        <button class="model-btn" id="card-gemini" onclick="setModel('gemini')">
          <div class="model-dot" style="background:#4285f4"></div>
          <div><div class="model-name">Gemini 2.0 Flash</div><div class="model-sub">Google · Flash Lite</div></div>
        </button>

        <button class="model-btn" id="card-llama" onclick="setModel('llama')">
          <div class="model-dot" style="background:#0467df"></div>
          <div><div class="model-name">Llama 3.3 70B</div><div class="model-sub">Meta · DeepInfra</div></div>
        </button>

        <button class="model-btn" id="card-deepseek" onclick="setModel('deepseek')">
          <div class="model-dot" style="background:#06b6d4"></div>
          <div><div class="model-name">DeepSeek 67B</div><div class="model-sub">DeepSeek · LuminAI</div></div>
        </button>

        <button class="model-btn" id="card-mistral" onclick="setModel('mistral')">
          <div class="model-dot" style="background:#f97316"></div>
          <div><div class="model-name">Mistral 7B</div><div class="model-sub">Mistral · LuminAI</div></div>
        </button>

        <button class="model-btn" id="card-qwen" onclick="setModel('qwen')">
          <div class="model-dot" style="background:#8b5cf6"></div>
          <div><div class="model-name">Qwen QwQ 32B</div><div class="model-sub">Alibaba · LuminAI</div></div>
        </button>

        <button class="model-btn" id="card-blackbox" onclick="setModel('blackbox')">
          <div class="model-dot" style="background:#a3a3a3"></div>
          <div><div class="model-name">BlackboxAI</div><div class="model-sub">Blackbox · LuminAI</div></div>
        </button>

        <button class="model-btn" id="card-luminai" onclick="setModel('luminai')">
          <div class="model-dot" style="background:#22c55e"></div>
          <div><div class="model-name">LuminAI</div><div class="model-sub">Cepat & ringan</div></div>
        </button>

        <button class="model-btn" id="card-unlimited" onclick="setModel('unlimited')">
          <div class="model-dot" style="background:#ec4899"></div>
          <div><div class="model-name">Unlimited AI</div><div class="model-sub">Reasoning model</div></div>
        </button>

        <button class="model-btn" id="card-sonnet" onclick="setModel('sonnet')">
          <div class="model-dot" style="background:#a855f7"></div>
          <div><div class="model-name">Claude Sonnet</div><div class="model-sub">Anthropic · via DashX</div></div>
        </button>

        <button class="model-btn" id="card-gita" onclick="setModel('gita')">
          <div class="model-dot" style="background:#f59e0b"></div>
          <div><div class="model-name">GitaGPT</div><div class="model-sub">Spiritual · Lord Krishna</div></div>
        </button>

        <button class="model-btn" id="card-muslimai" onclick="setModel('muslimai')">
          <div class="model-dot" style="background:#10b981"></div>
          <div><div class="model-name">Muslim AI</div><div class="model-sub">Islamic · Quran-based</div></div>
        </button>

        <button class="model-btn" id="card-bibleai" onclick="setModel('bibleai')">
          <div class="model-dot" style="background:#64748b"></div>
          <div><div class="model-name">Bible AI</div><div class="model-sub">Christian · Scripture</div></div>
        </button>

      </div>

      <!-- Chat History -->
      <div class="sb-label" style="margin-top:14px">Riwayat Chat</div>
      <div class="sb-history" id="chatHistory" style="padding:0">
        <div class="hist-empty">Belum ada riwayat</div>
      </div>
    </div>

    <!-- Bottom actions -->
    <div class="sb-bottom">
      <button class="btn-new" onclick="newChat()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Chat Baru
      </button>
      <button class="btn-logout" onclick="logout()">Keluar</button>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="hamburger" onclick="toggleSidebar()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div>
          <div class="header-model" id="headerModel">Pagaska AI</div>
          <div class="header-engine" id="headerEngine">Asisten Gala Taksaka</div>
        </div>
      </div>
      <div class="header-right">
        <button class="hdr-btn" onclick="saveChat()" title="Simpan chat">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Simpan
        </button>
        <button class="hdr-btn" id="adminBtn" onclick="window.location.href='/admin'" style="display:none">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          Admin
        </button>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-logo">
          <img src="https://iffrqakrixmgobvkzpzc.supabase.co/storage/v1/object/public/foto/logo.png" alt="Pagaska">
        </div>
        <div>
          <h2>Halo, <span id="welcomeName">—</span>! 👋</h2>
          <p>Pilih model AI dan mulai bertanya</p>
        </div>
        <div class="quick-grid">
          <button class="quick-btn" onclick="quickAsk('Apa itu Pagaska Gala Taksaka?')">Apa itu Pagaska?</button>
          <button class="quick-btn" onclick="quickAsk('Bagaimana sejarah berdirinya Gala Taksaka?')">Sejarah</button>
          <button class="quick-btn" onclick="quickAsk('Apa makna nama Gala Taksaka?')">Makna nama</button>
          <button class="quick-btn" onclick="quickAsk('Apa visi dan misi Pagaska?')">Visi & Misi</button>
          <button class="quick-btn" onclick="quickAsk('Apa saja kegiatan rutin Pagaska?')">Kegiatan</button>
          <button class="quick-btn" onclick="quickAsk('Cara mendaftar jadi anggota Pagaska?')">Cara daftar</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrap">
        <div class="textarea-wrap">
          <textarea id="msgInput" placeholder="Ketik pesan… (Shift+Enter untuk baris baru)" rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)" onpaste="handlePaste(event)"></textarea>
          <div class="paste-indicator">paste code → blok kode otomatis</div>
        </div>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script>
// ===== CONFIG =====
const modelConfig = {
  pagaska:  { name:'Pagaska AI',       engine:'Asisten Gala Taksaka',   color:'var(--gold2)' },
  gpt4:     { name:'GPT-4',            engine:'OpenAI · chateverywhere', color:'#74aa9c' },
  gemini:   { name:'Gemini 2.0 Flash', engine:'Google · Flash Lite',     color:'#4285f4' },
  llama:    { name:'Llama 3.3 70B',    engine:'Meta · DeepInfra',        color:'#0467df' },
  deepseek: { name:'DeepSeek 67B',     engine:'DeepSeek · LuminAI',      color:'#06b6d4' },
  mistral:  { name:'Mistral 7B',       engine:'Mistral · LuminAI',       color:'#f97316' },
  qwen:     { name:'Qwen QwQ 32B',     engine:'Alibaba · LuminAI',       color:'#8b5cf6' },
  blackbox: { name:'BlackboxAI',       engine:'Blackbox · LuminAI',      color:'#a3a3a3' },
  luminai:  { name:'LuminAI',          engine:'Cepat & ringan',           color:'#22c55e' },
  unlimited:{ name:'Unlimited AI',     engine:'Reasoning model',          color:'#ec4899' },
  sonnet:   { name:'Claude Sonnet',    engine:'Anthropic · via DashX',   color:'#a855f7' },
  gita:     { name:'GitaGPT',          engine:'Spiritual · Lord Krishna', color:'#f59e0b' },
  muslimai: { name:'Muslim AI',        engine:'Islamic · Quran-based',    color:'#10b981' },
  bibleai:  { name:'Bible AI',         engine:'Christian · Scripture',    color:'#64748b' },
};

let currentModel = 'pagaska';
let isGenerating = false;
let messages = [];
let currentUser = null;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('pagaska_token');
  if (!token) return (window.location.href = '/login.html');
  try {
    const res = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    if (!data.success) throw new Error();
    currentUser = data.user;
    const firstName = data.user.nama.split(' ')[0];
    document.getElementById('userName').textContent = data.user.nama;
    document.getElementById('userInitial').textContent = data.user.nama[0].toUpperCase();
    document.getElementById('welcomeName').textContent = firstName;
    const badge = document.getElementById('userBadge');
    const genColors = ['','#92400e','#374151','#713f12','#1e40af'];
    badge.textContent = `Gen ${data.user.generasi}`;
    badge.style.background = genColors[data.user.generasi] || '#1c1c1c';
    badge.style.color = '#e5e7eb'; badge.style.borderColor = 'transparent';
    if (data.user.isAdmin) document.getElementById('adminBtn').style.display = 'flex';
    loadHistory();
  } catch {
    localStorage.removeItem('pagaska_token');
    window.location.href = '/login.html';
  }
});

// ===== SIDEBAR =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ===== MODEL SWITCH =====
function setModel(model) {
  currentModel = model;
  document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active','active-pagaska'));
  const card = document.getElementById(`card-${model}`);
  card.classList.add(model === 'pagaska' ? 'active-pagaska' : 'active');
  const cfg = modelConfig[model] || { name: model, engine: '' };
  document.getElementById('headerModel').textContent = cfg.name;
  document.getElementById('headerEngine').textContent = cfg.engine;
  if (window.innerWidth <= 700) closeSidebar();
}

// ===== MARKDOWN RENDERER =====
function renderMarkdown(text) {
  // Escape helper — only for non-code content
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // 1. Fenced code blocks — extract first to avoid processing their content
  const codeBlocks = [];
  text = text.replace(/```([^\n]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    const safeLang = lang.trim() || 'text';
    const safeCode = esc(code.trimEnd());
    codeBlocks.push(
      `<div class="code-block"><div class="code-header"><span class="code-lang">${safeLang}</span><button class="code-copy" onclick="copyCode(this)">Salin</button></div><pre><code>${safeCode}</code></pre></div>`
    );
    return `\x00CB${idx}\x00`;
  });

  // 2. Escape remaining HTML
  text = esc(text);

  // 3. Headings
  text = text.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // 4. Blockquote
  text = text.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // 5. Horizontal rule
  text = text.replace(/^[-*_]{3,}$/gm, '<hr>');

  // 6. Bold + Italic
  text = text.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.*?)__/g, '<strong>$1</strong>');
  text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
  text = text.replace(/_(.*?)_/g, '<em>$1</em>');

  // 7. Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // 8. Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // 9. Tables (simple)
  text = text.replace(/((?:^[|].+[|]\n)+)/gm, (table) => {
    const rows = table.trim().split('\n').filter(r => !r.match(/^[|\s-]+$/));
    if (rows.length < 1) return table;
    let html = '<table>';
    rows.forEach((row, i) => {
      const cells = row.split('|').filter((_, j) => j > 0 && j < row.split('|').length - 1);
      const tag = i === 0 ? 'th' : 'td';
      html += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
    });
    return html + '</table>';
  });

  // 10. Ordered list
  text = text.replace(/^(\d+)\. (.+)$/gm, '<li-ord>$2</li-ord>');
  text = text.replace(/((?:<li-ord>.+<\/li-ord>\n?)+)/g, m => '<ol>' + m.replace(/<li-ord>(.*?)<\/li-ord>/g,'<li>$1</li>') + '</ol>');

  // 11. Unordered list
  text = text.replace(/^[-*•] (.+)$/gm, '<li-ul>$1</li-ul>');
  text = text.replace(/((?:<li-ul>.+<\/li-ul>\n?)+)/g, m => '<ul>' + m.replace(/<li-ul>(.*?)<\/li-ul>/g,'<li>$1</li>') + '</ul>');

  // 12. Paragraph / line breaks
  const lines = text.split('\n');
  const paras = [];
  let buf = [];
  const blockTags = /^(<h[1-4]|<ul|<ol|<table|<blockquote|<hr|<div|<pre)/;
  for (const line of lines) {
    if (blockTags.test(line.trim()) || line.trim() === '') {
      if (buf.length) { paras.push('<p>' + buf.join('<br>') + '</p>'); buf = []; }
      if (line.trim()) paras.push(line);
    } else {
      buf.push(line);
    }
  }
  if (buf.length) paras.push('<p>' + buf.join('<br>') + '</p>');
  text = paras.join('\n');

  // 13. Restore code blocks
  text = text.replace(/\x00CB(\d+)\x00/g, (_, i) => codeBlocks[parseInt(i)]);

  return text;
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✓ Tersalin';
    setTimeout(() => btn.textContent = 'Salin', 1800);
  });
}

// ===== PASTE HANDLER =====
function handlePaste(e) {
  const text = e.clipboardData?.getData('text') || '';
  // Detect if it looks like code: has indentation, brackets, semicolons, etc.
  const codePatterns = [/^\s{2,}/m, /[{}();]/m, /\bfunction\b/m, /\bconst\b|\blet\b|\bvar\b/m, /=>/, /<\/?[a-z]+[\s>]/m, /import\s+/m, /\bdef\b|\bclass\b/m];
  const looksLikeCode = text.split('\n').length > 2 && codePatterns.some(p => p.test(text));
  if (looksLikeCode) {
    e.preventDefault();
    const input = document.getElementById('msgInput');
    const cursor = input.selectionStart;
    const before = input.value.slice(0, cursor);
    const after = input.value.slice(input.selectionEnd);
    // Wrap in backticks if multiline code
    const wrapped = '```\n' + text + '\n```';
    input.value = before + wrapped + after;
    const newPos = cursor + wrapped.length;
    input.setSelectionRange(newPos, newPos);
    autoResize(input);
  }
}

// ===== APPEND MESSAGE =====
function escHtml(t) {
  const d = document.createElement('div');
  d.textContent = String(t || '');
  return d.innerHTML;
}

function appendMsg(role, text, isThinking = false) {
  const ws = document.getElementById('welcomeScreen');
  if (ws) ws.remove();
  const msgs = document.getElementById('messages');

  if (isThinking) {
    const wrap = document.createElement('div');
    wrap.className = 'thinking-wrap';
    wrap.innerHTML = `<div class="thinking-block"><div class="thinking-label">🧠 Sedang berpikir...</div>${escHtml(text)}</div>`;
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return;
  }

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${role === 'user' ? 'user-av' : 'ai-av'}`;
  if (role === 'ai') {
    avatar.innerHTML = `<img src="https://iffrqakrixmgobvkzpzc.supabase.co/storage/v1/object/public/foto/logo.png" alt="">`;
  } else {
    avatar.textContent = currentUser?.nama?.[0]?.toUpperCase() || 'U';
  }

  const bub = document.createElement('div');
  bub.className = `bubble ${role}`;
  if (role === 'user') {
    bub.textContent = text; // plain text for user (preserves spaces etc.)
    bub.style.whiteSpace = 'pre-wrap';
  } else {
    bub.innerHTML = renderMarkdown(text);
  }

  row.appendChild(avatar);
  row.appendChild(bub);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  messages.push({ role: role === 'user' ? 'user' : 'assistant', content: text });
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = 'typingRow';
  const av = document.createElement('div');
  av.className = 'msg-avatar ai-av';
  av.innerHTML = `<img src="https://iffrqakrixmgobvkzpzc.supabase.co/storage/v1/object/public/foto/logo.png" alt="">`;
  const bub = document.createElement('div');
  bub.className = 'bubble ai';
  bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(av);
  wrap.appendChild(bub);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { document.getElementById('typingRow')?.remove(); }

// ===== SEND =====
async function send() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isGenerating) return;
  input.value = ''; input.style.height = 'auto';
  appendMsg('user', text);
  showTyping();
  isGenerating = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const token = localStorage.getItem('pagaska_token');
    const res = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ message: text, model: currentModel })
    });
    const data = await res.json();
    removeTyping();
    if (!data.success) throw new Error(data.error || 'Error dari server');
    if (data.think) appendMsg('ai', data.think, true);
    appendMsg('ai', data.response || data.message || '—');
    autoSave();
  } catch (err) {
    removeTyping();
    appendMsg('ai', `❌ **Error:** ${err.message}`);
  } finally {
    isGenerating = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ===== QUICK ASK =====
function quickAsk(q) {
  if (currentModel !== 'pagaska') setModel('pagaska');
  document.getElementById('msgInput').value = q;
  send();
}

// ===== NEW CHAT =====
function newChat() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  const ws = document.createElement('div');
  ws.className = 'welcome'; ws.id = 'welcomeScreen';
  const name = currentUser?.nama?.split(' ')[0] || '—';
  const cfg = modelConfig[currentModel] || {};
  ws.innerHTML = `
    <div class="welcome-logo"><img src="https://iffrqakrixmgobvkzpzc.supabase.co/storage/v1/object/public/foto/logo.png" alt=""></div>
    <div><h2>Chat Baru 🆕</h2><p>Model: <strong style="color:var(--text)">${cfg.name || currentModel}</strong></p></div>`;
  msgs.appendChild(ws);
  messages = [];
  if (window.innerWidth <= 700) closeSidebar();
}

// ===== SAVE CHAT =====
async function saveChat() {
  if (!messages.length) return alert('Belum ada chat untuk disimpan.');
  try {
    const token = localStorage.getItem('pagaska_token');
    const res = await fetch('/api/chat/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ messages, model: currentModel })
    });
    const data = await res.json();
    if (data.success) {
      alert('✅ Chat berhasil disimpan!');
      loadHistory();
    }
  } catch (err) { alert('Gagal simpan: ' + err.message); }
}

async function autoSave() {
  if (!messages.length) return;
  try {
    const token = localStorage.getItem('pagaska_token');
    await fetch('/api/chat/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ messages, model: currentModel })
    });
    loadHistory();
  } catch {}
}

// ===== HISTORY =====
async function loadHistory() {
  try {
    const token = localStorage.getItem('pagaska_token');
    const res = await fetch('/api/chat/history', { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    if (!data.success) return;
    const container = document.getElementById('chatHistory');
    if (!data.chats.length) { container.innerHTML = '<div class="hist-empty">Belum ada riwayat</div>'; return; }
    container.innerHTML = data.chats.slice(0, 20).map(c => {
      const date = new Date(c.savedAt).toLocaleDateString('id-ID', { day:'numeric', month:'short' });
      const time = new Date(c.savedAt).toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
      const preview = (c.preview || '(kosong)').slice(0, 40);
      return `<div class="hist-item" onclick='openHistory(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
        <div class="hist-date">${c.model || '?'} · ${date} ${time}</div>
        ${escHtml(preview)}${c.preview?.length > 40 ? '…' : ''}
      </div>`;
    }).join('');
  } catch {}
}

function openHistory(chat) {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  messages = [];
  if (chat.model && modelConfig[chat.model]) setModel(chat.model);
  chat.messages?.forEach(m => appendMsg(m.role === 'user' ? 'user' : 'ai', m.content));
  messages = [...(chat.messages || [])];
  if (window.innerWidth <= 700) closeSidebar();
}

function logout() { localStorage.clear(); window.location.href = '/login.html'; }
</script>
</body>
