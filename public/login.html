<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login — Pagaska AI</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --bg1:#111;
  --bg2:#181818;
  --bg3:#222;
  --border:#2a2a2a;
  --border2:#333;
  --text:#f0ece4;
  --text2:#888;
  --text3:#555;
  --red:#9b1111;
  --red2:#c0392b;
  --gold:#c9a84c;
  --gold2:#e8c96a;
  --accent:#8b1a1a;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:20px}

/* ---- LOGO ---- */
.logo-wrap{text-align:center;margin-bottom:28px}
.emblem{
  width:60px;height:60px;border-radius:16px;
  background:linear-gradient(145deg,#1e0505,#3d0a0a);
  border:1.5px solid var(--gold);
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:12px;
  box-shadow:0 0 24px rgba(139,26,26,0.4);
}
.logo-wrap h1{font-size:22px;font-weight:700;letter-spacing:-0.5px;color:var(--text)}
.logo-wrap h1 span{color:var(--gold)}
.logo-wrap p{font-size:12px;color:var(--text2);margin-top:3px;letter-spacing:0.3px}

/* ---- CARD ---- */
.card{
  width:100%;max-width:380px;
  background:var(--bg1);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
}

/* ---- STEP 1: Pilih Generasi ---- */
#step1{padding:20px}
#step1 h2{font-size:14px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px;text-align:center}
.gen-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.gen-btn{
  padding:14px 10px;border-radius:12px;
  background:var(--bg2);border:1px solid var(--border);
  color:var(--text);cursor:pointer;text-align:center;
  transition:border-color 0.15s,background 0.15s,transform 0.1s;
  position:relative;overflow:hidden;
}
.gen-btn:hover{border-color:var(--border2);background:var(--bg3)}
.gen-btn.active{border-color:var(--gold);background:rgba(201,168,76,0.06)}
.gen-btn:active{transform:scale(0.97)}
.gen-num{font-size:18px;font-weight:700;color:var(--gold);display:block;margin-bottom:2px}
.gen-label{font-size:12px;font-weight:500}
.gen-sub{font-size:10px;color:var(--text3);margin-top:1px}

/* ---- STEP 2: Form ---- */
#step2{display:none}
.form-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.back-btn{
  width:30px;height:30px;border-radius:8px;
  background:var(--bg2);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.15s;
}
.back-btn:hover{border-color:var(--border2);color:var(--text)}
.form-header-text h3{font-size:15px;font-weight:600}
.form-header-text p{font-size:11px;color:var(--text2)}

.form-body{padding:20px}
.form-body .form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;letter-spacing:0.2px}
input[type=text]{
  width:100%;padding:11px 14px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;
  outline:none;transition:border-color 0.15s,box-shadow 0.15s;
}
input[type=text]::placeholder{color:var(--text3)}
input[type=text]:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1)}

.info-box{
  padding:10px 12px;border-radius:9px;
  background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.2);
  font-size:11px;color:var(--gold);margin-bottom:14px;display:none;
}

.submit-btn{
  width:100%;padding:13px;border-radius:11px;
  background:linear-gradient(135deg,var(--red2),var(--red));
  border:1px solid rgba(201,168,76,0.2);
  color:#fff;font-size:14px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:opacity 0.15s,transform 0.1s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:6px;
}
.submit-btn:hover{opacity:0.9}
.submit-btn:active{transform:scale(0.99)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.error-box{
  padding:10px 12px;border-radius:9px;
  background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);
  font-size:12px;color:#e74c3c;margin-top:12px;display:none;text-align:center;
}

/* ---- DIVIDER ---- */
.divider{height:1px;background:var(--border);margin:16px 0}

/* ---- ANIMATIONS ---- */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp 0.35s ease-out both}
.logo-wrap{animation:fadeUp 0.35s ease-out 0.05s both}
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="emblem">
  <img src="https://iffrqakrixmgobvkzpzc.supabase.co/storage/v1/object/public/foto/logo.png" width="80" height="80" style="object-fit:contain">
</div>
  <h1>Pagaska <span>AI</span></h1>
  <p>Paskibra Gala Taksaka · SMKN 5 Madiun</p>
</div>

<div class="card">

  <!-- Step 1 -->
  <div id="step1">
    <h2>Pilih Generasi</h2>
    <div class="gen-grid">
      <button class="gen-btn" onclick="selectGenerasi(1)">
        <span class="gen-num">I</span>
        <span class="gen-label">Generasi 1</span>
        <div class="gen-sub">Pendiri</div>
      </button>
      <button class="gen-btn" onclick="selectGenerasi(2)">
        <span class="gen-num">II</span>
        <span class="gen-label">Generasi 2</span>
        <div class="gen-sub">Penerus</div>
      </button>
      <button class="gen-btn" onclick="selectGenerasi(3)">
        <span class="gen-num">III</span>
        <span class="gen-label">Generasi 3</span>
        <div class="gen-sub">Pengembang</div>
      </button>
      <button class="gen-btn" onclick="selectGenerasi(4)">
        <span class="gen-num">IV</span>
        <span class="gen-label">Generasi 4</span>
        <div class="gen-sub">Anggota Baru</div>
      </button>
    </div>
  </div>

  <!-- Step 2 -->
  <div id="step2">
    <div class="form-header">
      <button class="back-btn" onclick="backToStep1()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <div class="form-header-text">
        <h3>Login Generasi <span id="genNumber"></span></h3>
        <p id="loginTypeText">Masukkan data Anda</p>
      </div>
    </div>

    <div class="form-body">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Contoh: Ahmad Fauzi" autocomplete="name">
      </div>

      <div id="jabatanContainer" class="form-group">
        <label>Jabatan</label>
        <input type="text" id="jabatan" placeholder="Contoh: Ketua Umum">
      </div>

      <div class="info-box" id="infoGen4">
        Generasi 4 otomatis menggunakan jabatan "Anggota"
      </div>

      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
        <span id="btnText">Masuk</span>
        <svg id="btnIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        <div class="spinner" id="btnLoading"></div>
      </button>

      <div class="error-box" id="errorMsg">
        <span id="errorText"></span>
      </div>
    </div>
  </div>

</div>

<script>
let selectedGenerasi = null;

function selectGenerasi(gen) {
  selectedGenerasi = gen;
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('genNumber').textContent = ['','I','II','III','IV'][gen];

  const isGen4 = gen === 4;
  const jContainer = document.getElementById('jabatanContainer');
  const jInput = document.getElementById('jabatan');
  const info = document.getElementById('infoGen4');

  if (isGen4) {
    jContainer.style.display = 'none';
    jInput.value = 'Anggota';
    info.style.display = 'block';
    document.getElementById('loginTypeText').textContent = 'Akses Anggota Gratis';
  } else {
    jContainer.style.display = 'block';
    jInput.value = '';
    info.style.display = 'none';
    document.getElementById('loginTypeText').textContent = 'Login dengan Nama & Jabatan';
  }
  setTimeout(() => document.getElementById('nama').focus(), 80);
}

function backToStep1() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step1').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
  selectedGenerasi = null;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('step2').style.display !== 'none') handleLogin();
});

async function handleLogin() {
  const nama = document.getElementById('nama').value.trim();
  const jabatan = document.getElementById('jabatan').value.trim();
  if (!nama) return document.getElementById('nama').focus();

  const btn = document.getElementById('loginBtn');
  const btnText = document.getElementById('btnText');
  const btnIcon = document.getElementById('btnIcon');
  const btnLoading = document.getElementById('btnLoading');

  btn.disabled = true;
  btnText.textContent = 'Memproses...';
  btnIcon.style.display = 'none';
  btnLoading.style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ nama, jabatan, generasi: selectedGenerasi })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('pagaska_token', data.token);
      localStorage.setItem('pagaska_user', JSON.stringify(data.user));
      window.location.href = '/';
    } else {
      throw new Error(data.error || 'Login gagal');
    }
  } catch (err) {
    document.getElementById('errorText').textContent = err.message;
    document.getElementById('errorMsg').style.display = 'block';
    btn.disabled = false;
    btnText.textContent = 'Masuk';
    btnIcon.style.display = 'inline';
    btnLoading.style.display = 'none';
  }
}

if (localStorage.getItem('pagaska_token')) window.location.href = '/';
</script>
</body>
</html>
