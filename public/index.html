<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pagaska AI Chat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --bg1:#0f0f0f;
  --bg2:#141414;
  --bg3:#1c1c1c;
  --bg4:#222;
  --border:#1e1e1e;
  --border2:#2a2a2a;
  --border3:#333;
  --text:#f0ece4;
  --text2:#888;
  --text3:#555;
  --red:#9b1111;
  --red2:#c0392b;
  --gold:#c9a84c;
  --gold2:#e8c96a;
  --bubble-user-from:#9b1111;
  --bubble-user-to:#7a0d0d;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-tap-highlight-color:transparent;overflow:hidden}

/* ===== LAYOUT ===== */
.app{display:flex;height:100dvh}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;flex-shrink:0;
  background:var(--bg1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100%;overflow:hidden;
  transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
}
.sidebar-inner{display:flex;flex-direction:column;height:100%;padding:16px;gap:16px;overflow-y:auto}
.sidebar-inner::-webkit-scrollbar{width:3px}
.sidebar-inner::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* User profile */
.user-profile{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:11px;
  background:var(--bg2);border:1px solid var(--border);
}
.user-avatar{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--red2),var(--red));
  border:1px solid rgba(201,168,76,0.3);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:#fff;
}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-badge{
  display:inline-block;font-size:10px;padding:1px 7px;border-radius:20px;
  background:var(--bg3);color:var(--text2);margin-top:2px;border:1px solid var(--border2);
}

/* Section labels */
.section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}

/* Model cards */
.model-list{display:flex;flex-direction:column;gap:4px}
.model-card{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  background:transparent;border:1px solid transparent;
  color:var(--text2);cursor:pointer;text-align:left;
  transition:all 0.15s;width:100%;
}
.model-card:hover{background:var(--bg2);border-color:var(--border);color:var(--text)}
.model-card.active{background:var(--bg2);border-color:var(--border2);color:var(--text)}
.model-card.active-pagaska{
  background:rgba(139,26,26,0.12);
  border-color:rgba(201,168,76,0.25);
  color:var(--text);
}
.model-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.model-card-text{flex:1;min-width:0}
.model-card-name{font-size:13px;font-weight:500}
.model-card-sub{font-size:11px;color:var(--text3);margin-top:0px}
.model-card.active .model-card-sub,
.model-card.active-pagaska .model-card-sub{color:var(--text2)}
.pagaska-icon{
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  background:linear-gradient(145deg,#1e0505,#3d0a0a);
  border:1px solid rgba(201,168,76,0.4);
  display:flex;align-items:center;justify-content:center;
}

/* Chat history */
.history-list{display:flex;flex-direction:column;gap:3px;flex:1}
.history-item{
  padding:8px 10px;border-radius:8px;font-size:12px;
  color:var(--text2);cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:all 0.12s;border:1px solid transparent;
}
.history-item:hover{background:var(--bg2);color:var(--text);border-color:var(--border)}
.history-empty{font-size:12px;color:var(--text3);text-align:center;padding:12px 0}

/* Actions */
.sidebar-actions{display:flex;flex-direction:column;gap:6px;margin-top:auto}
.btn-new{
  padding:10px;border-radius:10px;
  background:linear-gradient(135deg,var(--red2),var(--red));
  border:1px solid rgba(201,168,76,0.2);
  color:#fff;font-size:13px;font-weight:500;font-family:inherit;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:opacity 0.15s;
}
.btn-new:hover{opacity:0.88}
.btn-logout{
  padding:10px;border-radius:10px;
  background:transparent;border:1px solid var(--border2);
  color:var(--text2);font-size:13px;font-family:inherit;
  cursor:pointer;transition:all 0.15s;
}
.btn-logout:hover{border-color:var(--border3);color:var(--text)}

/* ===== MAIN AREA ===== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}

/* Header */
.header{
  height:52px;flex-shrink:0;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:var(--bg);
  position:sticky;top:0;z-index:10;
}
.header-left{display:flex;align-items:center;gap:10px}
.hamburger{
  width:34px;height:34px;border-radius:9px;
  background:transparent;border:1px solid var(--border);
  color:var(--text2);cursor:pointer;display:none;
  align-items:center;justify-content:center;
  transition:all 0.15s;flex-shrink:0;
}
.hamburger:hover{border-color:var(--border2);color:var(--text)}
.header-model-name{font-size:14px;font-weight:600}
.header-status{font-size:11px;color:var(--text2);margin-top:1px}

.btn-save{
  width:34px;height:34px;border-radius:9px;
  background:transparent;border:1px solid var(--border);
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.btn-save:hover{border-color:var(--border2);color:var(--text)}

/* Messages */
.messages{
  flex:1;overflow-y:auto;padding:20px 16px;
  display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Welcome */
.welcome{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1;text-align:center;padding:24px;
  gap:12px;
}
.welcome-emblem{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(145deg,#1e0505,#3d0a0a);
  border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(139,26,26,0.3);
}
.welcome h2{font-size:18px;font-weight:700}
.welcome p{font-size:13px;color:var(--text2)}
.quick-btns{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-top:4px}
.quick-btn{
  padding:7px 13px;border-radius:20px;
  background:transparent;border:1px solid var(--border2);
  color:var(--text2);font-size:12px;font-family:inherit;
  cursor:pointer;transition:all 0.15s;
}
.quick-btn:hover{border-color:rgba(201,168,76,0.4);color:var(--gold)}

/* Bubbles */
.msg-row{display:flex;gap:8px;align-items:flex-end}
.msg-row.user{flex-direction:row-reverse}
.bubble{
  max-width:78%;padding:10px 14px;font-size:14px;line-height:1.65;
  border-radius:16px;word-break:break-word;
}
.bubble.ai{
  background:var(--bg2);border:1px solid var(--border);
  color:var(--text);border-bottom-left-radius:4px;
}
.bubble.user{
  background:linear-gradient(135deg,var(--bubble-user-from),var(--bubble-user-to));
  color:#fff;border-bottom-right-radius:4px;
  border:1px solid rgba(255,255,255,0.06);
}
.bubble strong{font-weight:600}
.bubble pre{
  background:rgba(0,0,0,0.4);padding:10px;border-radius:8px;
  overflow-x:auto;font-size:12px;margin-top:8px;border:1px solid var(--border2);
  font-family:'SF Mono','Fira Code',monospace;
}
.bubble code{
  background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;
  font-size:12px;font-family:monospace;
}
.thinking-block{
  max-width:78%;padding:10px 12px;
  background:rgba(30,60,100,0.25);border:1px solid rgba(99,148,218,0.2);
  border-left:3px solid #4a90d9;border-radius:10px;
  font-size:12px;color:#8ab4d8;font-family:monospace;line-height:1.5;
}
.thinking-label{font-size:11px;font-weight:600;color:#6fa3d0;margin-bottom:4px;letter-spacing:0.3px}

/* Typing */
.typing-dots{display:flex;gap:4px;padding:4px 2px;align-items:center}
.typing-dots span{
  width:6px;height:6px;border-radius:50%;
  background:var(--text3);display:block;
  animation:blink 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}

/* Input */
.input-bar{
  border-top:1px solid var(--border);padding:12px 16px;
  background:var(--bg1);flex-shrink:0;
}
.input-wrap{
  display:flex;gap:8px;align-items:flex-end;
  max-width:760px;margin:0 auto;
}
textarea{
  flex:1;background:var(--bg2);border:1px solid var(--border2);
  border-radius:12px;padding:11px 14px;
  color:var(--text);font-size:14px;font-family:inherit;
  resize:none;min-height:42px;max-height:120px;line-height:1.5;
  outline:none;transition:border-color 0.15s;
}
textarea::placeholder{color:var(--text3)}
textarea:focus{border-color:rgba(201,168,76,0.35)}
.send-btn{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,var(--red2),var(--red));
  border:1px solid rgba(201,168,76,0.2);
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.15s,transform 0.1s;
  box-shadow:0 2px 10px rgba(139,17,17,0.4);
}
.send-btn:hover{opacity:0.88}
.send-btn:active{transform:scale(0.96)}
.send-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}

/* Overlay */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.7);z-index:40;
}
.overlay.show{display:block}

/* ===== MOBILE ===== */
@media(max-width:720px){
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;z-index:50;
    width:280px;transform:translateX(-100%);
    box-shadow:4px 0 24px rgba(0,0,0,0.6);
  }
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:flex}
  .messages{padding:16px 12px}
  .bubble{max-width:88%}
  .input-bar{padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
}

/* Fade in messages */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row,.thinking-block{animation:fadeUp 0.25s ease-out}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">

      <!-- User profile -->
      <div class="user-profile">
        <div class="user-avatar" id="userInitial">P</div>
        <div style="min-width:0">
          <div class="user-name" id="userName">Loading...</div>
          <span class="user-badge" id="userBadge">Gen —</span>
        </div>
      </div>

      <!-- Models -->
      <div>
        <div class="section-label">Model AI</div>
        <div class="model-list">

          <button class="model-card active-pagaska" id="card-pagaska" onclick="setModel('pagaska')">
            <div class="pagaska-icon">
                <img src="https://iffrqakrixmgobvkzpzc.supabase.co/storage/v1/object/public/foto/logo.png" width="14" height="14" style="object-fit:contain">
             </div>
            <div class="model-card-text">
              <div class="model-card-name" style="color:var(--gold2)">Pagaska AI</div>
              <div class="model-card-sub">Asisten Gala Taksaka</div>
            </div>
          </button>

          <button class="model-card" id="card-unlimited" onclick="setModel('unlimited')">
            <div class="model-dot" style="background:#4ade80"></div>
            <div class="model-card-text">
              <div class="model-card-name">Unlimited AI</div>
              <div class="model-card-sub">Cepat & ringan</div>
            </div>
          </button>

          <button class="model-card" id="card-gita" onclick="setModel('gita')">
            <div class="model-dot" style="background:#fb923c"></div>
            <div class="model-card-text">
              <div class="model-card-name">GitaGPT</div>
              <div class="model-card-sub">Spiritual guide</div>
            </div>
          </button>

          <button class="model-card" id="card-gpt4" onclick="setModel('gpt4')">
            <div class="model-dot" style="background:#f87171"></div>
            <div class="model-card-text">
              <div class="model-card-name">GPT-4</div>
              <div class="model-card-sub">OpenAI</div>
            </div>
          </button>

        </div>
      </div>

      <!-- History -->
      <div style="flex:1;display:flex;flex-direction:column;min-height:0">
        <div class="section-label">Riwayat Chat</div>
        <div class="history-list" id="chatHistory">
          <div class="history-empty">Belum ada riwayat</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="sidebar-actions">
        <button class="btn-new" onclick="newChat()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          Chat Baru
        </button>
        <button class="btn-logout" onclick="logout()">Keluar</button>
      </div>

    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="hamburger" onclick="toggleSidebar()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div>
          <div class="header-model-name" id="headerModelName">Pagaska AI</div>
          <div class="header-status" id="headerStatus">Asisten Gala Taksaka</div>
        </div>
      </div>
      <button class="btn-save" onclick="saveChat()" title="Simpan chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-emblem">
            <img src="https://iffrqakrixmgobvkzpzc.supabase.co/storage/v1/object/public/foto/logo.png" width="34" height="34" style="object-fit:contain">
          </div>
        <div>
          <h2>Hormat, <span id="welcomeName">—</span>!</h2>
          <p>AI Pagaska siap melayani</p>
        </div>
        <div class="quick-btns" id="quickBtns">
          <button class="quick-btn" onclick="quickAsk('Apa itu Pagaska Gala Taksaka?')">Apa itu Pagaska?</button>
          <button class="quick-btn" onclick="quickAsk('Bagaimana sejarah berdirinya Gala Taksaka?')">Sejarah</button>
          <button class="quick-btn" onclick="quickAsk('Apa makna nama Gala Taksaka?')">Makna nama</button>
          <button class="quick-btn" onclick="quickAsk('Apa visi dan misi Pagaska?')">Visi & Misi</button>
          <button class="quick-btn" onclick="quickAsk('Apa saja kegiatan rutin Pagaska?')">Kegiatan</button>
          <button class="quick-btn" onclick="quickAsk('Cara mendaftar jadi anggota Pagaska?')">Cara daftar</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="msgInput" placeholder="Ketik pesan..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script>
// ===== STATE =====
let currentModel = 'pagaska';
let isGenerating = false;
let messages = [];
let currentUser = null;
let conversationId = null;

const modelConfig = {
  pagaska:   { name: 'Pagaska AI',   status: 'Asisten Gala Taksaka' },
  unlimited: { name: 'Unlimited AI', status: 'Cepat & ringan' },
  gita:      { name: 'GitaGPT',      status: 'Spiritual guide' },
  gpt4:      { name: 'GPT-4',        status: 'OpenAI' },
};

// ===== INIT =====
document.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('pagaska_token');
  if (!token) return (window.location.href = '/login.html');

  try {
    const res = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    if (!data.success) throw new Error();

    currentUser = data.user;
    const firstName = data.user.nama.split(' ')[0];
    document.getElementById('userName').textContent = data.user.nama;
    document.getElementById('userInitial').textContent = data.user.nama[0].toUpperCase();
    document.getElementById('welcomeName').textContent = firstName;

    const badge = document.getElementById('userBadge');
    badge.textContent = `Gen ${data.user.generasi}`;
    const badgeColors = ['','#92400e','#374151','#713f12','#1e40af'];
    badge.style.background = badgeColors[data.user.generasi] || '#1c1c1c';
    badge.style.color = '#e5e7eb';
    badge.style.borderColor = 'transparent';
  } catch {
    localStorage.removeItem('pagaska_token');
    window.location.href = '/login.html';
  }
});

// ===== SIDEBAR =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ===== MODEL SWITCH =====
function setModel(model) {
  currentModel = model;
  document.querySelectorAll('.model-card').forEach(c => {
    c.classList.remove('active', 'active-pagaska');
  });
  const card = document.getElementById(`card-${model}`);
  card.classList.add(model === 'pagaska' ? 'active-pagaska' : 'active');

  const cfg = modelConfig[model];
  document.getElementById('headerModelName').textContent = cfg.name;
  document.getElementById('headerStatus').textContent = cfg.status;

  if (window.innerWidth <= 720) closeSidebar();
}

// ===== QUICK ASK =====
function quickAsk(text) {
  if (currentModel !== 'pagaska') setModel('pagaska');
  document.getElementById('msgInput').value = text;
  send();
}

// ===== CHAT HELPERS =====
function escHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}
function fmtText(t) {
  return t
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function appendMsg(role, text, isThinking = false) {
  const ws = document.getElementById('welcomeScreen');
  if (ws) ws.remove();

  const msgs = document.getElementById('messages');

  if (isThinking) {
    const d = document.createElement('div');
    d.className = 'thinking-block';
    d.innerHTML = `<div class="thinking-label">🧠 Thinking</div>${escHtml(text)}`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
    return;
  }

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  const bub = document.createElement('div');
  bub.className = `bubble ${role}`;
  bub.innerHTML = role === 'user' ? escHtml(text) : fmtText(text);
  row.appendChild(bub);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  messages.push({ role: role === 'user' ? 'user' : 'assistant', content: text });
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typingRow';
  const bub = document.createElement('div');
  bub.className = 'bubble ai';
  bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  row.appendChild(bub);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { document.getElementById('typingRow')?.remove(); }

// ===== SEND =====
async function send() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isGenerating) return;

  input.value = '';
  input.style.height = 'auto';
  appendMsg('user', text);
  showTyping();
  isGenerating = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const token = localStorage.getItem('pagaska_token');
    const body = { message: text };
    if (currentModel === 'pixel') body.conversationId = conversationId;

    const res = await fetch(`/api/${currentModel}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    removeTyping();

    if (!data.success) throw new Error(data.error || 'Error');

    if (currentModel === 'deepseek' && data.think) {
      appendMsg('ai', data.think, true);
    }
    appendMsg('ai', data.response || data.message || '—');

  } catch (err) {
    removeTyping();
    appendMsg('ai', '❌ ' + err.message);
  } finally {
    isGenerating = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// ===== KEY HANDLER =====
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ===== NEW CHAT =====
function newChat() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  const ws = document.createElement('div');
  ws.className = 'welcome';
  ws.id = 'welcomeScreen';
  const name = currentUser?.nama?.split(' ')[0] || '—';
  ws.innerHTML = `
    <div class="welcome-emblem">
      <svg viewBox="0 0 26 26" width="28" height="28"><polygon points="13,2 15.5,9 23,9 17,14 19.5,21 13,17 6.5,21 9,14 3,9 10.5,9" fill="#C9A84C" stroke="#E8C96A" stroke-width="0.5"/></svg>
    </div>
    <div><h2>Chat Baru</h2><p>Model aktif: ${modelConfig[currentModel].name}</p></div>`;
  msgs.appendChild(ws);
  messages = [];
  conversationId = null;
  if (window.innerWidth <= 720) closeSidebar();
}

// ===== SAVE =====
async function saveChat() {
  if (!messages.length) return alert('Tidak ada chat untuk disimpan');
  try {
    const token = localStorage.getItem('pagaska_token');
    const res = await fetch('/api/chat/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ messages })
    });
    const data = await res.json();
    if (data.success) alert('Chat disimpan!');
  } catch (err) { alert('Gagal: ' + err.message); }
}

function logout() {
  localStorage.clear();
  window.location.href = '/login.html';
}
</script>
